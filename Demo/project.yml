name: CubePickerDemo
options:
  bundleIdPrefix: com.cwood
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  createIntermediateGroups: true
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
packages:
  CubeColorPicker:
    path: ../
targets:
  CubePickerDemo:
    type: application
    platform: iOS
    sources:
      - path: CubePickerDemoShared
    dependencies:
      - package: CubeColorPicker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cwood.CubePickerDemo
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
  CubePickerDemoMac:
    type: application
    platform: macOS
    sources:
      - path: CubePickerDemoShared
    dependencies:
      - package: CubeColorPicker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cwood.CubePickerDemoMac
